repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uvx --python 3.8 --from ruff==0.15.20 ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uvx --python 3.8 --from ruff==0.15.20 ruff format
        language: system
        types_or: [python, pyi]

      - id: ty
        name: ty
        entry: uvx --python 3.8 --from ty==0.0.55 --with pytest==8.3.5 ty check plugins tests
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uvx --python 3.8 --from pytest==8.3.5 pytest tests
        language: system
        pass_filenames: false

      - id: vermin
        name: vermin
        entry: uvx --python 3.8 --from vermin==1.8.0 vermin -t=3.6- --violations plugins
        language: system
        pass_filenames: false
