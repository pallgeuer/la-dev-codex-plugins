[tool.pytest.ini_options]
filterwarnings = ["error"]
testpaths = ["tests"]
markers = [
    "isolated_cwd: run the test in a fresh writable temporary working directory",
]

[tool.ruff]
line-length = 200
target-version = "py38"
src = ["plugins", "tests"]

[tool.ruff.lint]
select = [
    "ARG",
    "B",
    "C4",
    "E",
    "F",
    "I",
    "PERF",
    "PIE",
    "PLC",
    "PLE",
    "PLW",
    "PTH",
    "PT",
    "RET",
    "RUF",
    "SIM",
    "W",
]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = []
